<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Juego Egipcio PRO</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./css/styles.css" />
  </head>
  <body>
    <div class="banner">𓂀 JUEGO EGIPCIO INTERACTIVO 𓂀</div>

    <div class="card text-center shadow" id="card">
      <h2 id="question"></h2>

      <div class="time-bar">
        <div class="time-fill" id="timeFill"></div>
      </div>

      <div id="options" class="d-grid gap-3 mt-4"></div>

      <h4 id="result" class="mt-3"></h4>

      <p class="mt-3">Puntaje: <span id="score">0</span></p>
    </div>

    <script src="./js/script.js"></script>
  </body>
</html>
